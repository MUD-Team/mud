name: CMake

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  # The number of days to retain artifacts
  RETENTION_DAYS: 30

jobs:
  build-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
      #- name: Install dependencies via vcpkg
        #run: vcpkg install --triplet=x64-windows-static curl jsoncpp protobuf sdl2 sdl2-mixer[core] fluidlite[core] --binarysource="clear;x-gha,readwrite"
      - uses: actions/checkout@v4
      - name: Configure CMake MSVC
        run: mkdir build && cd build && cmake .. -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_TOOLCHAIN_FILE=C:\\vcpkg\\scripts\\buildsystems\\vcpkg.cmake -DVCPKG_INSTALL_OPTIONS="--binarysource=\"clear;x-gha,readwrite\""
      - name: Build MSVC
        run: cmake --build build --config ${{env.BUILD_TYPE}}
      - uses: actions/upload-artifact@v3
        with:
          name: mud-msvc
          path: |
            bin/soundfonts
            bin/mud-client.exe
            bin/mud-server.exe
            bin/odamex.wad
          retention-days: ${{env.RETENTION_DAYS}}      